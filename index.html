<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loanify | Advanced EMI Platform</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
}

header {
    background: #1e3c72;
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    margin-top: 20px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    background: #2a5298;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    opacity: 0.9;
}

.highlight {
    background: #e6f0ff;
    padding: 12px;
    border-radius: 8px;
    margin-top: 10px;
}

.table-container {
    margin-top: 20px;
    max-height: 400px;
    overflow: auto;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

@media(max-width: 768px) {
    .grid {
        grid-template-columns: 1fr;
    }
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
}

th {
    background: #2a5298;
    color: white;
}
</style>
</head>

<body>

<header>
    <h2>Loanify</h2>
    <nav>
        <a href="#">Home</a>
    </nav>
</header>

<div class="container">

    <div class="card">
        <h3>Advanced EMI Calculator</h3>

        <input type="number" id="amount" placeholder="Loan Amount">
        <input type="number" id="rate" placeholder="Interest Rate (%)">
        <input type="number" id="time" placeholder="Time (Years)">

        <label>Payment Frequency</label>
        <select id="frequency">
            <option value="12">Monthly</option>
            <option value="4">Quarterly</option>
            <option value="1">Yearly</option>
        </select>

        <label>Processing Fee (%)</label>
        <input type="number" id="fee" placeholder="Example: 1">

        <label>Prepayment Amount (Optional)</label>
        <input type="number" id="prepayInput" placeholder="Extra Payment">

        <button onclick="calculateEMI()">Calculate EMI</button>

        <div id="result"></div>
        <div class="table-container" id="table"></div>
    </div>

    <div class="card">
        <h3>Loan Comparison</h3>

        <div class="grid">
            <div>
                <h4>Loan 1</h4>
                <input type="number" id="c1" placeholder="Amount">
                <input type="number" id="r1" placeholder="Interest Rate (%)">
                <input type="number" id="t1" placeholder="Years">
            </div>

            <div>
                <h4>Loan 2</h4>
                <input type="number" id="c2" placeholder="Amount">
                <input type="number" id="r2" placeholder="Interest Rate (%)">
                <input type="number" id="t2" placeholder="Years">
            </div>
        </div>

        <button onclick="compareLoans()">Compare Loans</button>

        <div id="compareResult"></div>
    </div>

</div>

<script>
function calculateEMI() {
    let P = parseFloat(document.getElementById('amount').value);
    let annualRate = parseFloat(document.getElementById('rate').value);
    let years = parseFloat(document.getElementById('time').value);
    let freq = parseInt(document.getElementById('frequency').value);
    let feePerc = parseFloat(document.getElementById('fee').value) || 0;
    let prepayVal = parseFloat(document.getElementById('prepayInput').value) || 0;

    if (isNaN(P) || isNaN(annualRate) || isNaN(years)) {
        document.getElementById('result').innerHTML = "Please enter all values";
        return;
    }

    let n = years * freq;
    let r = annualRate / 100 / freq;

    let EMI = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);

    let processingFee = P * (feePerc / 100);
    let totalPayment = (EMI * n) + processingFee;

    document.getElementById('result').innerHTML = `
        <div class="highlight">
            <b>EMI:</b> ₹${EMI.toFixed(2)}<br>
            <b>Processing Fee:</b> ₹${processingFee.toFixed(2)}<br>
            <b>Total Payment:</b> ₹${totalPayment.toFixed(2)}
        </div>
    `;

    generateTable(P, r, n, EMI, prepayVal);
}

function generateTable(P, r, n, EMI, prepayVal) {
    let balance = P;

    let html = `
    <table>
        <tr>
            <th>Period</th>
            <th>Opening Balance</th>
            <th>Interest</th>
            <th>Principal Paid</th>
            <th>Closing Balance</th>
        </tr>`;

    for (let i = 1; i <= n; i++) {
        let opening = balance;
        let interest = opening * r;
        let principal = EMI - interest;

        // Closing balance includes interest
        balance = opening + interest - EMI - prepayVal;

        if (balance < 0) {
            balance = 0;
        }

        html += `
        <tr>
            <td>${i}</td>
            <td>₹${opening.toFixed(2)}</td>
            <td>₹${interest.toFixed(2)}</td>
            <td>₹${principal.toFixed(2)}</td>
            <td>₹${balance.toFixed(2)}</td>
        </tr>`;

        if (balance <= 0) {
            break;
        }
    }

    html += `</table>`;
    document.getElementById('table').innerHTML = html;
}

function compareLoans() {
    let P1 = parseFloat(document.getElementById('c1').value);
    let R1 = parseFloat(document.getElementById('r1').value);
    let T1 = parseFloat(document.getElementById('t1').value);

    let P2 = parseFloat(document.getElementById('c2').value);
    let R2 = parseFloat(document.getElementById('r2').value);
    let T2 = parseFloat(document.getElementById('t2').value);

    if (!P1 || !R1 || !T1 || !P2 || !R2 || !T2) {
        document.getElementById('compareResult').innerHTML = "Please enter all comparison values";
        return;
    }

    let r1 = R1 / 12 / 100;
    let n1 = T1 * 12;

    let r2 = R2 / 12 / 100;
    let n2 = T2 * 12;

    let emi1 = (P1 * r1 * Math.pow(1 + r1, n1)) / (Math.pow(1 + r1, n1) - 1);
    let emi2 = (P2 * r2 * Math.pow(1 + r2, n2)) / (Math.pow(1 + r2, n2) - 1);

    let total1 = emi1 * n1;
    let total2 = emi2 * n2;

    let betterLoan = total1 < total2
        ? "Loan 1 is better because it has a lower total payment."
        : "Loan 2 is better because it has a lower total payment.";

    document.getElementById('compareResult').innerHTML = `
        <div class="highlight">
            <b>Loan 1</b><br>
            EMI: ₹${emi1.toFixed(2)}<br>
            Total Payment: ₹${total1.toFixed(2)}<br><br>

            <b>Loan 2</b><br>
            EMI: ₹${emi2.toFixed(2)}<br>
            Total Payment: ₹${total2.toFixed(2)}<br><br>

            <b>Suggestion:</b> ${betterLoan}
        </div>
    `;
}
</script>

</body>
</html>
```
